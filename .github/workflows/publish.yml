name: Publish GHCR Multi-Arch

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      OPENCHAMBER_VERSION:
        description: '@openchamber/web npm version'
        required: false
        default: 'latest'
      OPENCODE_VERSION:
        description: 'opencode-ai npm version'
        required: false
        default: 'latest'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version inputs
        id: versions
        run: |
          OC_VER="${{ github.event.inputs.OPENCHAMBER_VERSION || 'latest' }}"
          OCODE_VER="${{ github.event.inputs.OPENCODE_VERSION || 'latest' }}"

          # Tag push: derive semver from git tag (strip 'v' prefix)
          TAG_VERSION=""
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_VERSION="${{ github.ref_name }}"
            TAG_VERSION="${TAG_VERSION#v}"
          fi

          echo "OPENCHAMBER_VERSION=${OC_VER}" >> $GITHUB_OUTPUT
          echo "OPENCODE_VERSION=${OCODE_VER}" >> $GITHUB_OUTPUT
          echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_OUTPUT

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          OC_VER="${{ steps.versions.outputs.OPENCHAMBER_VERSION }}"
          OCODE_VER="${{ steps.versions.outputs.OPENCODE_VERSION }}"
          TAG_VERSION="${{ steps.versions.outputs.TAG_VERSION }}"
          # Docker requiere owner lowercase para registry references
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/opencode-openchamber"

          TAGS="${BASE}:latest"
          TAGS="${TAGS},${BASE}:sha-${SHORT_SHA}"

          # Pinned tag: usa tag semver si es push de tag, si no usa versiones del dispatch
          if [[ -n "${TAG_VERSION}" ]]; then
            TAGS="${TAGS},${BASE}:${TAG_VERSION}"
          else
            TAGS="${TAGS},${BASE}:openchamber-${OC_VER}-opencode-${OCODE_VER}"
          fi

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${BASE}:main"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "sha_tag=${BASE}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            OPENCHAMBER_VERSION=${{ steps.versions.outputs.OPENCHAMBER_VERSION }}
            OPENCODE_VERSION=${{ steps.versions.outputs.OPENCODE_VERSION }}

      - name: Validate multi-arch manifest
        run: |
          IMAGE="${{ steps.tags.outputs.sha_tag }}"
          echo "Inspecting ${IMAGE}..."
          MANIFEST=$(docker buildx imagetools inspect "${IMAGE}")
          echo "${MANIFEST}"
          echo ""
          if echo "${MANIFEST}" | grep -q "linux/amd64"; then
            echo "✓ linux/amd64 present"
          else
            echo "ERROR: linux/amd64 platform missing from manifest"
            exit 1
          fi
          if echo "${MANIFEST}" | grep -q "linux/arm64"; then
            echo "✓ linux/arm64 present"
          else
            echo "ERROR: linux/arm64 platform missing from manifest"
            exit 1
          fi
          echo "Multi-arch manifest validated successfully."

  deploy-dokploy:
    needs: build-and-publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        run: |
          curl -fsS -X POST "${{ secrets.DOKPLOY_DEPLOY_URL }}" \
            -H "Content-Type: application/json"
          echo "Dokploy deploy triggered"
