# Dependabot configuration
# Docs: docs/update-policy.md
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    ignore:
      # Non-LTS Node (impares: 23, 25, 27...)
      - dependency-name: "node"
        versions: ["23", "25", "27"]
      # Evitar bump automático de major en Node (e.g. distro Debian bookworm → trixie)
      # hasta revisión manual de compatibilidad con better-sqlite3, node-pty, bun-pty
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
