schema: spec-driven
context: |
  Language: spanish
  Write in spanish, but:
  - Keep technical terms like "API", "REST", "GraphQL" in English
  - Code examples and file paths remain in English

  Tech stack:
  - Base image: node:22-bookworm-slim
  - Runtime: Node.js 22 LTS on Debian/glibc
  - Package manager: npm for global CLIs
  - OpenCode: opencode-ai installed globally with OPENCODE_VERSION build arg
  - OpenChamber: @openchamber/web installed globally with OPENCHAMBER_VERSION build arg
  - Bun: installed explicitly for OpenCode plugin compatibility/cache
  - OS packages: bash, ca-certificates, git, gh, openssh-client, tini
  - Container user: openchamber UID/GID 1000
  - Local orchestration: Docker Compose v2
  - Registry: GHCR
  - CI/CD: GitHub Actions + Docker Buildx + QEMU
  - Platforms: linux/amd64 and linux/arm64
  - Avoid Alpine/musl in MVP due native deps risk: better-sqlite3, node-pty, bun-pty

strict_tdd: false

testing:
  test_runner:
    framework: none
    command: null
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage:
    available: false
    command: null
  quality:
    linter: { available: false, command: null }
    type_checker: { available: false, command: null }
    formatter: { available: false, command: null }

rules:
  proposal:
     - Keep proposals under 1500 words
     - Always include a "Non-goals" section
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Break tasks into chunks of max 2 hours
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
